<ion-header class="de-header ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button class="de-menu-btn" menu="main-menu"></ion-menu-button>
    </ion-buttons>
    <ion-title class="de-header__title">Categories</ion-title>
    <ion-buttons slot="end">
      <ion-button class="de-header-toolbar-btn" (click)="viewNotifications()" fill="clear">
        <ion-icon slot="icon-only" name="notifications-circle-outline"></ion-icon>
      </ion-button>
      <ion-button class="de-header-toolbar-btn" (click)="viewNotifications()" fill="clear">
        <ion-icon slot="icon-only" name="chatbox-ellipses-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="de-page">
  <div class="de-page__inner">
    <div class="de-hero">
      <h2>Category Management</h2>
      <p>Organize menu categories for restaurants</p>
    </div>

    <ion-grid fixed>
      <ion-row>
        <ion-col size="6" offset="3">
          <ion-list>
            <ion-list-header>
              <ion-label>All Categories</ion-label>
              <ion-button (click)="add()">Add new</ion-button>
            </ion-list-header>
            <ion-item *ngFor="let item of cats">
              <ion-avatar slot="start">
                <img crossorigin="anonymous" [src]="item.image_url" />
              </ion-avatar>
              <ion-label>{{item.name | uppercase}}</ion-label>
              <ion-button (click)="delete(item._id)" fill="clear" color="danger" slot="end">
                <ion-icon slot="icon-only" name="trash"></ion-icon>
              </ion-button>
            </ion-item>
          </ion-list>
        </ion-col>
        <ion-col size="6"></ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>

<ion-header class="de-header ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button class="de-menu-btn" menu="main-menu"></ion-menu-button>
    </ion-buttons>
    <ion-title class="de-header__title">Register</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="de-page">
  <div class="de-page__inner de-coming-soon">
    <div class="de-hero">
      <h2>Admin Registration</h2>
      <p>Self-service admin account signup</p>
    </div>
    <div class="de-empty">
      <ion-icon name="person-add-outline" class="de-empty__icon"></ion-icon>
      <h4>Coming soon</h4>
      <p>This feature is planned for Phase 2</p>
    </div>
  </div>
</ion-content>

<ion-header class="de-header ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/folder/partners"></ion-back-button>
    </ion-buttons>
    <ion-title class="de-header__title">Set Business Location</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="de-map-page">
  <div class="de-map-shell">
    <google-map
      [center]="center"
      [zoom]="zoom"
      [options]="mapOptions"
      [height]="null"
      [width]="null"
      (mapInitialized)="onMapInitialized($event)"
      (idle)="onMapIdle()"
      (mapDragend)="onMapIdle()"
    ></google-map>

    <div class="de-map-pin" aria-hidden="true"></div>

    <button
      type="button"
      class="de-map-locate-btn"
      (click)="recenterOnMe()"
      aria-label="Center on my location"
    >
      <ion-icon name="locate-outline"></ion-icon>
    </button>

    <div class="de-map-panel">
      <p class="de-map-panel__label t-label">Selected location</p>

      <div class="de-map-panel__address-row">
        <ion-spinner *ngIf="isGeocoding" name="crescent"></ion-spinner>
        <p class="de-map-panel__address">
          {{
            formattedAddress ||
              'Move the map to pin the exact restaurant spot'
          }}
        </p>
      </div>

      <p class="de-map-panel__coords t-mono" *ngIf="lat != null && lng != null">
        {{ lat | number : '1.5-5' }}, {{ lng | number : '1.5-5' }}
      </p>

      <ion-button
        expand="block"
        size="large"
        color="primary"
        [disabled]="!hasValidCoords"
        (click)="confirmLocation()"
      >
        Use this location
      </ion-button>
    </div>
  </div>
</ion-content>

<ion-content [fullscreen]="true" class="de-page">
  <div class="login-root">
    <div class="login-card">
      <div class="login-card__top">
        <img src="assets/logo.svg" alt="DropEat" />
        <h1>Welcome Back</h1>
        <p>Sign in to DropEat Admin</p>
      </div>
      <div class="login-card__body">
        <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
          <div class="de-field">
            <label class="de-field__label">Email</label>
            <input
              type="email"
              class="de-field__input"
              formControlName="email"
              placeholder="admin@dropeat.com"
            />
            <div class="form-error" *ngIf="submitted && f['email'].errors">
              <span *ngIf="f['email'].errors['required']">Email is required</span>
              <span *ngIf="f['email'].errors['email']">Enter a valid email</span>
            </div>
          </div>
          <div class="de-field">
            <label class="de-field__label">Password</label>
            <input
              type="password"
              class="de-field__input"
              formControlName="password"
              placeholder="Enter your password"
            />
            <div class="form-error" *ngIf="submitted && f['password'].errors">
              <span *ngIf="f['password'].errors['required']">Password is required</span>
              <span *ngIf="f['password'].errors['minlength']">Minimum 6 characters</span>
            </div>
          </div>
          <button type="submit" class="de-btn de-btn--primary" style="width: 100%; padding: 12px">
            Sign In
          </button>
        </form>
      </div>
    </div>
  </div>
</ion-content>
